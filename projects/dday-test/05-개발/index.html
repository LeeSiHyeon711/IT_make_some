<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D-Day 카운터</title>
  <style>
    /* style.css 인라인(더블클릭 file:// 호환) — 이슈 #2 스타일/반응형
       설계서 5장(세로 1열, 결과 강조) + PRD 5장(모바일 한눈) 반영. 의존성 0 순수 CSS. */

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #f4f6fb;
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* 세로 1열 레이아웃 */
    .container {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .title {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: #2563eb;
    }

    /* 입력 필드 — 라벨 위, 입력 아래 세로 구성 */
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #4b5563;
    }

    .field input {
      width: 100%;
      font-size: 1rem;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #fff;
      color: #1f2937;
    }

    .field input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    /* 결과 영역 — 시각적 강조 */
    .result {
      text-align: center;
      font-size: 2rem;
      font-weight: 800;
      color: #ffffff;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border-radius: 14px;
      padding: 28px 16px;
      min-height: 96px;
      display: flex;
      align-items: center;
      justify-content: center;
      word-break: keep-all;
      line-height: 1.3;
    }

    /* 모바일(~375px) — 스크롤 없이 한눈에 */
    @media (max-width: 400px) {
      body {
        padding: 12px;
      }
      .container {
        padding: 20px 16px;
        gap: 16px;
        border-radius: 14px;
      }
      .title {
        font-size: 1.3rem;
      }
      .result {
        font-size: 1.6rem;
        padding: 22px 12px;
        min-height: 80px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1 class="title">D-Day 카운터</h1>

    <div class="field">
      <label for="eventName">이벤트 이름 (선택)</label>
      <input type="text" id="eventName" placeholder="예: 토익시험">
    </div>

    <div class="field">
      <label for="targetDate">목표 날짜</label>
      <input type="date" id="targetDate">
    </div>

    <div class="result" id="result">날짜를 선택하세요</div>
  </main>

  <script>
    // script.js 인라인(더블클릭 file:// 호환) — D-Day 로직
    // 이슈 #3: calcDday 구현 / 이슈 #4: formatLabel 구현 / 이슈 #5: render() + 즉시 갱신 바인딩

    /**
     * 두 날짜의 일수 차를 정수로 반환한다.
     * 로컬 연·월·일(getFullYear/getMonth/getDate)만 취해 자정으로 정규화한 뒤
     * 차이를 계산하므로 타임존 경계로 인한 ±1일 오차가 발생하지 않는다.
     *
     * @param {Date} targetDate 목표 날짜 (Date 객체)
     * @param {Date} today       기준이 되는 오늘 날짜 (Date 객체)
     * @returns {number} 남은 일수. 미래>0, 당일=0, 과거<0
     */
    function calcDday(targetDate, today) {
      const MS_PER_DAY = 24 * 60 * 60 * 1000;
      // 각 날짜의 로컬 연/월/일만으로 자정 기준 시각을 재구성 (시·분·초·ms = 0)
      const target = new Date(
        targetDate.getFullYear(),
        targetDate.getMonth(),
        targetDate.getDate()
      );
      const base = new Date(
        today.getFullYear(),
        today.getMonth(),
        today.getDate()
      );
      // 두 자정 시각의 차를 일 단위로 환산해 반올림(서머타임 등 1시간 오차 흡수)
      return Math.round((target - base) / MS_PER_DAY);
    }

    /**
     * 일수 차(diff)와 이벤트명을 받아 화면에 표시할 문자열을 만든다.
     * 라벨 규칙(설계서 4장):
     *   diff > 0  → "D-{diff}"     (미래, 남은 날)
     *   diff === 0 → "D-0"          (당일)
     *   diff < 0  → "D+{|diff|}"    (과거, 지난 날)
     * 이벤트명이 있으면 "{이벤트명} {라벨}"로 접두를 붙이고, 없으면 라벨만 반환한다.
     *
     * @param {number} diff       calcDday가 반환한 일수 차(정수)
     * @param {string} [eventName] 이벤트 이름 (선택, 비어 있으면 라벨만)
     * @returns {string} 표시 문자열
     */
    function formatLabel(diff, eventName) {
      let label;
      if (diff > 0) {
        label = "D-" + diff;          // 미래
      } else if (diff === 0) {
        label = "D-0";                // 당일
      } else {
        label = "D+" + Math.abs(diff); // 과거
      }

      // 이벤트명 앞뒤 공백 제거 후 값이 있으면 접두로 붙인다.
      const name = (eventName || "").trim();
      return name ? name + " " + label : label;
    }

    // ── 이슈 #5: render() + 즉시 갱신 바인딩 ─────────────────────────────
    // 설계서 3장: 버튼 없이 input/change 이벤트로 실시간 갱신.
    // 설계서 4장: render()는 입력값을 읽어 calcDday → formatLabel을 호출하고
    //             결과 영역(#result)에 출력한다. 날짜 미입력 시 안내 문구.

    // 안내 문구(날짜 미입력 시 표시) — index.html 초기 텍스트와 동일
    const PLACEHOLDER_TEXT = "날짜를 선택하세요";

    /**
     * 현재 입력값을 읽어 결과 영역을 갱신한다.
     * - 목표 날짜가 비어 있으면 안내 문구를 표시한다.
     * - 날짜가 있으면 오늘 기준으로 calcDday → formatLabel을 호출해 라벨을 출력한다.
     * - input type=date의 value는 "YYYY-MM-DD" 문자열이므로 연/월/일로 분해해
     *   로컬 타임존 Date로 구성한다(new Date("YYYY-MM-DD")의 UTC 파싱 오차 방지).
     */
    function render() {
      const eventNameEl = document.getElementById("eventName");
      const targetDateEl = document.getElementById("targetDate");
      const resultEl = document.getElementById("result");

      const dateValue = targetDateEl.value; // "" 또는 "YYYY-MM-DD"

      // 날짜 미입력 → 안내 문구로 복귀
      if (!dateValue) {
        resultEl.textContent = PLACEHOLDER_TEXT;
        return;
      }

      // "YYYY-MM-DD" → 로컬 자정 Date (UTC 파싱 오차 방지를 위해 직접 분해)
      const [year, month, day] = dateValue.split("-").map(Number);
      const targetDate = new Date(year, month - 1, day);

      const diff = calcDday(targetDate, new Date());
      resultEl.textContent = formatLabel(diff, eventNameEl.value);
    }

    // 입력 즉시 갱신: 이름은 타이핑(input), 날짜는 선택(change)+input 모두 바인딩.
    function bindEvents() {
      const eventNameEl = document.getElementById("eventName");
      const targetDateEl = document.getElementById("targetDate");

      eventNameEl.addEventListener("input", render);
      targetDateEl.addEventListener("input", render);
      targetDateEl.addEventListener("change", render);

      // 초기 1회 렌더(미입력 상태 안내 문구 보장)
      render();
    }

    // DOM 준비 후 바인딩 (script가 body 끝에 있어 즉시 실행도 안전하지만 방어적으로 처리)
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", bindEvents);
    } else {
      bindEvents();
    }
  </script>
</body>
</html>
